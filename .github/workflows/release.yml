name: release

# Cuts a release on every merge to master: autobumps the version from the latest
# git tag, builds the R8-minified, signed release APK, tags the commit and
# publishes a GitHub Release with the APK attached.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Avoid two pushes racing to publish the same tag/release.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags: we read the latest tag to bump the version name
          # and use the commit count as a monotonic versionCode.
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          latest="$(git tag -l 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then
            # First release: start the series at the app's base version.
            name="1.0.0"
          else
            ver="${latest#v}"
            IFS='.' read -r major minor patch <<< "$ver"
            name="${major}.${minor}.$((patch + 1))"
          fi
          code="$(git rev-list --count HEAD)"
          echo "name=$name"   >> "$GITHUB_OUTPUT"
          echo "code=$code"   >> "$GITHUB_OUTPUT"
          echo "tag=v$name"   >> "$GITHUB_OUTPUT"
          echo "Releasing v$name (versionCode $code)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        id: signing
        env:
          PIA_KEYSTORE_BASE64: ${{ secrets.PIA_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${PIA_KEYSTORE_BASE64:-}" ]; then
            # Strip all whitespace before decoding: GNU `base64 -d` rejects stray
            # whitespace as "invalid input", and a secret pasted from `base64`
            # (line-wrapped) or through a CRLF clipboard carries newlines/CRs.
            printf '%s' "$PIA_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "PIA_KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
            echo "Using release signing key."
          else
            # No signing secret configured: the build falls back to the debug key
            # (see app/build.gradle.kts) so the release is still installable.
            echo "::warning::PIA_KEYSTORE_BASE64 not set — signing the release APK with the debug key."
          fi

      - name: Build R8-minified release APK
        env:
          PIA_KEYSTORE_PASSWORD: ${{ secrets.PIA_KEYSTORE_PASSWORD }}
          PIA_KEY_ALIAS: ${{ secrets.PIA_KEY_ALIAS }}
          PIA_KEY_PASSWORD: ${{ secrets.PIA_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -PVERSION_NAME="${{ steps.version.outputs.name }}" \
            -PVERSION_CODE="${{ steps.version.outputs.code }}" \
            --stacktrace

      - name: Stage release APK
        id: apk
        run: |
          set -euo pipefail
          src="app/build/outputs/apk/release/app-release.apk"
          out="PlayIntegrityAlert-${{ steps.version.outputs.tag }}.apk"
          cp "$src" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.apk.outputs.path }}
