name: build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests + 100% coverage gate
        # Robolectric JVM tests; fails the build unless the covered logic hits
        # 100% line and branch coverage (see app/build.gradle.kts).
        run: ./gradlew :app:testDebugUnitTest :app:jacocoTestReport :app:jacocoTestCoverageVerification --stacktrace

      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: app/build/reports/jacoco/jacocoTestReport
          if-no-files-found: warn

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: play-integrity-alert-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
